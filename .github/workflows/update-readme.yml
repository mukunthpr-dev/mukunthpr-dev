name: Update GitHub Stats Cache

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch Streak Stats SVG
        run: |
          # Download the streak stats SVG directly to avoid GitHub Camo timeouts
          curl -s --max-time 120 "https://github-readme-streak-stats.herokuapp.com/?user=mukunthpr-dev&theme=transparent&count_private=true&border_radius=10&locale=en" -o streak-stats.svg

      - name: Update cache-busting parameter in README
        run: |
          sed -i -E 's/(&v=)[0-9]+/\1'"$(date +%s)"'/g' README.md
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md streak-stats.svg
          if ! git diff --staged --quiet; then
            git commit -m "chore: update stats and fetch streak SVG"
            git pull --rebase origin main
            git push origin HEAD:main
          fi