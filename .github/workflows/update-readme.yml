name: Update GitHub Stats Cache

on:
  schedule:
    # 0 4 * * * is 12:00 AM Eastern Time (EDT) / 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # explicitly checkout the main branch

      - name: Update cache-busting parameter in README
        run: |
          sed -i -E 's/(&v=)[0-9]+/\1'"$(date +%s)"'/g' README.md
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Check if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: update github stats cache"
            # Pull any remote changes before pushing to avoid conflicts
            git pull --rebase origin main
            git push origin HEAD:main
          fi